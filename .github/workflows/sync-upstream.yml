name: Sync Upstream GSD

on:
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run AI Sync Script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/auto-sync.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync upstream GSD changes"
          title: "Auto-Sync: Upstream GSD Updates"
          body: |
            This PR contains automated LLM translations of recent upstream GSD changes into Antigravity workflows.

            Please review the modified files carefully to ensure the AI correctly understood and applied the upstream logic.
          branch: auto-sync-gsd
          delete-branch: true
